name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: build_only_placeholder

      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit --prefix client --omit=dev --audit-level=high

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase DB lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Skipping Supabase DB lint: SUPABASE_ACCESS_TOKEN is not configured."
            exit 0
          fi
          if [ -z "$SUPABASE_DB_URL" ] && [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping Supabase DB lint: set SUPABASE_DB_URL or SUPABASE_PROJECT_REF."
            exit 0
          fi
          if [ -n "$SUPABASE_DB_URL" ]; then
            supabase db lint --db-url "$SUPABASE_DB_URL" --fail-on error
          else
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
            supabase db lint --linked --fail-on error
          fi
