name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            git --redact --no-banner --verbose .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: build_only_placeholder

      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit --prefix client --omit=dev --audit-level=high

      - name: RLS smoke test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MENT_EMP_EMAIL: ${{ secrets.MENT_EMP_EMAIL }}
          MENT_EMP_PASSWORD: ${{ secrets.MENT_EMP_PASSWORD }}
          MENT_ADMIN_EMAIL: ${{ secrets.MENT_ADMIN_EMAIL }}
          MENT_ADMIN_PASSWORD: ${{ secrets.MENT_ADMIN_PASSWORD }}
        run: |
          # Self-skips when SUPABASE_URL / seed users are not configured.
          python3 scripts/rls_smoke_test.py

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase DB lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Skipping Supabase DB lint: SUPABASE_ACCESS_TOKEN is not configured."
            exit 0
          fi
          if [ -z "$SUPABASE_DB_URL" ] && [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping Supabase DB lint: set SUPABASE_DB_URL or SUPABASE_PROJECT_REF."
            exit 0
          fi
          if [ -n "$SUPABASE_DB_URL" ]; then
            supabase db lint --db-url "$SUPABASE_DB_URL" --fail-on error
          else
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
            supabase db lint --linked --fail-on error
          fi
